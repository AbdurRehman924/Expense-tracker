<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Expense Tracker</h1>

    <div class="balance">
      <p>Your Balance</p>
      <h2 id="balance">$0.00</h2>
    </div>

    <div class="summary">
      <div class="income">
        <p>Income</p>
        <h3 id="totalIncome">+$0.00</h3>
      </div>
      <div class="expense">
        <p>Expense</p>
        <h3 id="totalExpense">-$0.00</h3>
      </div>
    </div>

    <h3>Add Transaction</h3>
    <div class="form">
      <input type="text" id="desc" placeholder="Description (e.g. Salary)" />
      <input type="number" id="amount" placeholder="Amount (use - for expense)" />
      <button onclick="addTransaction()">Add</button>
    </div>

    <h3>History</h3>
    <ul id="list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
